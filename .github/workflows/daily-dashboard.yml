name: Daily SiC-GaN Dashboard

on:
  schedule:
    # 每日台北時間 06:30（UTC 前一日 22:30）
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sic-gan-pages
  cancel-in-progress: true

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh daily metadata and verify sources
        run: python scripts/update_sic_gan_dashboard.py
      - name: Build static Pages package
        run: |
          mkdir -p _site/app
          cp index.html _site/index.html
          cp app/globals.css _site/app/globals.css
          touch _site/.nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

